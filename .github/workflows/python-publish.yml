# Release flow: pushing a git tag publishes the package to PyPI and creates
# a GitHub Release. To cut a release:
#
#   1. Bump version in pyproject.toml, biotuner/__init__.py, docs/conf.py.
#   2. Commit and push to main.
#   3. git tag v<version>  (e.g. v0.2.0)
#   4. git push origin v<version>
#
# The tag push triggers this workflow. Tag = release. Keep all three
# version sources in sync before tagging — the tag itself is what makes
# the release official.

name: Upload Python Package

on:
  push:
    tags:
      - '*'  # Triggers on all tag pushes

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
